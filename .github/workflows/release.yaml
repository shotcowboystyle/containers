---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Release

on:
  push:
    branches:
      - main
    paths:
      - apps/**
  workflow_dispatch:
    inputs:
      app:
        type: string
        description: App Name
        required: true
      release:
        type: boolean
        description: Release
        required: false
        default: false

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/paperclip
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - uses: docker/bake-action@v6
        with:
          files: ./docker-bake.hcl
          targets: paperclip
          push: true
          set: |
            paperclip.tags=${{ join(fromJSON(steps.meta.outputs.json).tags, ',') }}
            paperclip.labels=${{ join(fromJSON(steps.meta.outputs.json).labels, ',') }}
